name: CodeQL Advanced

on:
  pull_request:
    branches:
      - main
  merge_group:
  push:
    branches:
      - main
  schedule:
    - cron: "23 8 * * 3"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codeql-advanced::${{ github.ref }}
  cancel-in-progress: false

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
            config_file: ./.codeql-runtime/codeql-actions.yml
          - language: rust
            build-mode: none
            config_file: ./.github/codeql/codeql-rust.yml

    steps:
      - name: Checkout repository
        # actions/checkout v6
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install Rust toolchain for CodeQL
        if: ${{ matrix.language == 'rust' }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import subprocess
          import tomllib
          from pathlib import Path

          toolchains = {}
          for path in sorted(Path(".").glob("**/rust-toolchain*")):
              text = path.read_text(encoding="utf-8").strip()
              if text.startswith("["):
                  data = tomllib.loads(text)
                  toolchain = data["toolchain"]
                  channel = toolchain["channel"]
                  components = set(toolchain.get("components", []))
              else:
                  channel = text
                  components = set()
              components.add("rust-src")
              toolchains.setdefault(channel, set()).update(components)

          if not toolchains:
              toolchains["stable"] = {"rust-src"}

          for channel, components in sorted(toolchains.items()):
              command = [
                  "rustup",
                  "toolchain",
                  "install",
                  channel,
                  "--profile",
                  "minimal",
                  "--no-self-update",
              ]
              for component in sorted(components):
                  command.extend(["--component", component])
              subprocess.run(command, check=True)
          PY

      - name: Restore Rust dependency cache for CodeQL
        if: ${{ matrix.language == 'rust' }}
        id: cache_codeql_rust_cargo_home_restore
        # actions/cache v5
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: codeql-rust-cargo-home-v1-${{ runner.os }}-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock', '**/rust-toolchain*') }}
          restore-keys: |
            codeql-rust-cargo-home-v1-${{ runner.os }}-

      - name: Prefetch Rust dependencies for CodeQL
        if: ${{ matrix.language == 'rust' }}
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          cargo fetch --locked --manifest-path Cargo.toml

      - name: Prepare Actions CodeQL query pack config
        if: ${{ matrix.language == 'actions' }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p .codeql-runtime
          pack_path="./.github/codeql/actions-workflow-security"

          if [[ '${{ github.event_name }}' == 'pull_request' &&
            '${{ github.event.pull_request.head.repo.full_name }}' != '${{ github.repository }}' ]]; then
            trusted_root="${{ github.workspace }}/.codeql-runtime/trusted-base"
            trusted_pack="./.codeql-runtime/trusted-base/.github/codeql/actions-workflow-security"
            mkdir -p "${trusted_root}"

            if git fetch --no-tags --depth=1 origin '${{ github.event.pull_request.base.sha }}' &&
              git archive '${{ github.event.pull_request.base.sha }}' .github/codeql/actions-workflow-security |
                tar -x -C "${trusted_root}"; then
              pack_path="${trusted_pack}"
            else
              echo "::warning title=CodeQL Actions query pack bootstrap::Trusted base query pack was unavailable; using the checked-out pack for this run."
            fi
          fi

          {
            echo "name: spark-mcp-codeql-actions-runtime"
            echo
            echo "queries:"
            echo "  - uses: security-and-quality"
            echo "  - uses: ${pack_path}"
            echo
            echo "threat-models: [local]"
          } > .codeql-runtime/codeql-actions.yml

      - name: Initialize CodeQL
        # github/codeql-action v4
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ${{ matrix.config_file }}
          dependency-caching: ${{ github.event_name == 'pull_request' && 'restore' || 'full' }}

      - name: Perform CodeQL analysis
        # github/codeql-action v4
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          category: "/language:${{ matrix.language }}"

      - name: Save Rust dependency cache for CodeQL
        if: ${{ always() && !cancelled() && matrix.language == 'rust' && steps.cache_codeql_rust_cargo_home_restore.outputs.cache-hit != 'true' && github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
        continue-on-error: true
        # actions/cache v5
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: codeql-rust-cargo-home-v1-${{ runner.os }}-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock', '**/rust-toolchain*') }}

  results:
    name: CodeQL required gate
    needs:
      - analyze
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      actions: read
    steps:
      - name: Report CodeQL timing
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          {
            echo "### CodeQL timing"
            gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100"               --jq '.jobs[]
                | select(.name | test("^(Analyze \\(\\)|CodeQL required gate)"))
                | "- \(.name): \(.status)/\(.conclusion // "") started=\(.started_at) completed=\(.completed_at // "")"'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize
        shell: bash
        run: |
          set -euo pipefail
          echo "analyze: ${{ needs.analyze.result }}"
          if [[ '${{ needs.analyze.result }}' != 'success' ]]; then
            echo 'CodeQL analysis failed.'
            exit 1
          fi
