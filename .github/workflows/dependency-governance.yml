name: dependency-governance

on:
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "deny.toml"
      - "scripts/dependency_governance_check.sh"
      - "docs/dependency-governance.md"
      - ".github/workflows/dependency-governance.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "deny.toml"
      - "scripts/dependency_governance_check.sh"
      - "docs/dependency-governance.md"
      - ".github/workflows/dependency-governance.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-governance:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        # actions/checkout v6
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install Rust toolchain
        # dtolnay/rust-toolchain stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Cache cargo artifacts
        # swatinem/rust-cache v2
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Install governance tools
        # taiki-e/install-action v2
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912
        with:
          tool: cargo-deny,cargo-audit,cargo-outdated

      - name: Run dependency governance checks
        env:
          STRICT_OUTDATED: "0"
        run: ./scripts/dependency_governance_check.sh
