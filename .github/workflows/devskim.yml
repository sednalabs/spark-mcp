name: DevSkim

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "20 23 * * 4"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: devskim::${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: DevSkim
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        # actions/checkout v6
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run DevSkim scanner
        # Microsoft DevSkim Action v1
        uses: microsoft/DevSkim-Action@4b5047945a44163b94642a1cecc0d93a3f428cc6

      - name: Upload DevSkim scan results to GitHub code scanning
        # github/codeql-action v4
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          sarif_file: devskim-results.sarif
