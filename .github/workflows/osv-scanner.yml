name: OSV-Scanner

on:
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main
  schedule:
    - cron: "23 17 * * 1"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: osv-scanner::${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan-scheduled:
    if: ${{ github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2
    permissions:
      actions: read
      contents: read
      security-events: write
    with:
      scan-args: |-
        -r
        --skip-git
        ./

  scan-pr:
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@9a498708959aeaef5ef730655706c5a1df1edbc2
    permissions:
      actions: read
      contents: read
      security-events: write
    with:
      scan-args: |-
        -r
        --skip-git
        ./
