name: Rust Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test And Tool Contract
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        # actions/checkout v6
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Format check
        run: cargo fmt --check

      - name: Unit and integration tests
        run: cargo test

      - name: Print tool inventory
        run: |
          set -euo pipefail
          cargo run --bin spark-mcp -- --print-tools > /tmp/tools.json
          test -s /tmp/tools.json
