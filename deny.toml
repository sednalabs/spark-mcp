[graph]
targets = []
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = [
  # Transitive semantic-search/indexing advisories tracked in docs/dependency-governance.md.
  "RUSTSEC-2024-0384",
  "RUSTSEC-2024-0436",
  "RUSTSEC-2025-0141",
  "RUSTSEC-2026-0002",
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MIT-0",
  "MPL-2.0",
  "Unicode-3.0",
  "Zlib",
]
exceptions = []

[bans]
multiple-versions = "allow"
wildcards = "allow"
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://github.com/sednalabs/mcp-toolkit-rs"]
